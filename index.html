<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Find Your Charity</title>

<style>
/* CLEAN AUTHENTIC STYLE */
:root{
  --ink:#18181b;
  --muted:#6b7280;
  --bg:#f6f3ec;
  --card:#fffdf8;
  --line:#e5dccb;
  --accent:#1f4f46;
  --green:#166534;
  --red:#b42318;
}

body{
  margin:0;
  font-family:Georgia, serif;
  background:var(--bg);
  color:var(--ink);
}

.container{width:90%;max-width:1100px;margin:auto}

/* HEADER */
.header{background:#fff;border-bottom:1px solid var(--line)}
.bar{display:flex;justify-content:space-between;padding:14px 0}
.brand{text-decoration:none;font-weight:bold}

/* HERO */
.hero{padding:40px 0}
h1{font-size:2.5rem;margin-bottom:10px}
.lead{color:var(--muted)}

.metric{margin-top:20px;font-size:1.1rem}

/* GRID */
.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:16px}
.card{
  background:var(--card);
  border:1px solid var(--line);
  padding:16px;
  border-radius:12px;
}

/* BUTTONS */
.btn{
  border:1px solid var(--line);
  padding:8px 12px;
  border-radius:8px;
  cursor:pointer;
}
.btn.primary{
  background:var(--accent);
  color:#fff;
}

/* COMPARE */
.compare{
  position:fixed;
  bottom:10px;
  left:50%;
  transform:translateX(-50%);
  background:#fff;
  padding:15px;
  border:1px solid var(--line);
  border-radius:10px;
  display:none;
}

.win{color:var(--green);font-weight:bold}
.lose{color:var(--red);font-weight:bold}
</style>
</head>

<body>

<header class="header">
  <div class="container bar">
    <a href="#" onclick="scrollTo(0,0)" class="brand">Find Your Charity</a>
  </div>
</header>

<section class="hero container">
  <h1>Find good charities faster</h1>
  <p class="lead">Compare real charities and see where the money goes.</p>

  <div class="metric"><strong>50</strong> real charities</div>
</section>

<section class="container">
  <div class="grid" id="grid"></div>
</section>

<div class="compare" id="compareBox"></div>

<script>
/* DATA (shortened example — keep yours here) */
const CHARITIES = [
  {name:"Feeding America",program:98,score:86},
  {name:"Red Cross",program:90,score:100},
  {name:"Direct Relief",program:99,score:100},
  {name:"World Central Kitchen",program:92,score:100}
  // 👉 your full 50 dataset stays here
];

/* RENDER */
const grid = document.getElementById("grid");

CHARITIES.forEach((c,i)=>{
  const div=document.createElement("div");
  div.className="card";
  div.innerHTML=`
    <h3>${c.name}</h3>
    <p>${c.program}% program</p>
    <button class="btn" onclick="select(${i})">Compare</button>
  `;
  grid.appendChild(div);
});

/* COMPARE LOGIC */
let selected=[];

function select(i){
  if(selected.includes(i)) return;
  if(selected.length<2){
    selected.push(i);
  }
  if(selected.length===2){
    showCompare();
  }
}

function compareClass(a,b,mode="higher"){
  if(a===b) return "";
  if(mode==="lower") return a<b?"win":"lose";
  return a>b?"win":"lose";
}

function showCompare(){
  const a=CHARITIES[selected[0]];
  const b=CHARITIES[selected[1]];

  document.getElementById("compareBox").style.display="block";
  document.getElementById("compareBox").innerHTML=`
    <h3>${a.name} vs ${b.name}</h3>
    <p>
      Program:
      <span class="${compareClass(a.program,b.program)}">${a.program}%</span> vs
      <span class="${compareClass(b.program,a.program)}">${b.program}%</span>
    </p>
    <p>
      Score:
      <span class="${compareClass(a.score,b.score)}">${a.score}</span> vs
      <span class="${compareClass(b.score,a.score)}">${b.score}</span>
    </p>
    <button onclick="clearCompare()">Clear</button>
  `;
}

function clearCompare(){
  selected=[];
  document.getElementById("compareBox").style.display="none";
}
</script>

</body>
</html>
